theme = "onedark"

[editor]
# Use system clipboard by default
# Not sure why this is not working...
# default-yank-register = "+"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true

[editor.file-picker]
git-ignore = false

[editor.statusline]
center = ["version-control", "diagnostics"]

[keys.normal]
C-s = ":w"
G = "goto_file_end"
"#" = "toggle_comments"
"^" = "goto_first_nonwhitespace"
"$" = "goto_line_end"

[keys.insert]
C-c = "normal_mode"

[keys.select]
C-c = "exit_select_mode"
"^" = "goto_first_nonwhitespace"
"$" = "goto_line_end"
